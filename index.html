<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Profesional - Agung</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
  background-color: #205bd2; 
  color: #ffffff; 
  font-family: 'Inter', sans-serif;
}

.navbar-custom {
  background: rgba(22, 202, 230, 0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid #454950;
}

.nav-link {
  color: #ffffff !important;
  opacity: 0.8;
  transition: 0.3s;
}

.nav-link:hover, .nav-link.active {
  color: #58a6ff !important;
  opacity: 1;
}

.nav-link.active {
  border-bottom: 2px solid #58a6ff;
}

/* FIX NAVBAR HP */
@media (max-width: 768px) {
  .navbar-nav {
    flex-wrap: nowrap !important;
    overflow-x: auto;
    white-space: nowrap;
  }

  .nav-item {
    flex: 0 0 auto;
  }

  .nav-link {
    font-size: 14px;
    padding: 8px 10px;
  }

  .navbar-nav::-webkit-scrollbar {
    display: none;
  }
}

.card {
  background: #174dd5;
  border: 1px solid #454950;
  border-radius: 18px;
  color: #ffffff;
}

.profile {
  width:160px;
  height:160px;
  border-radius: 50%;
  border: 4px solid #58a6ff;
  object-fit: cover;
  margin-bottom: 2rem;
}

.hero-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: calc(100vh - 72px);
  text-align: center;
}

/* SKILL BAR */
.skill-bar {
  background: #0d2f7a;
  height: 8px;
  border-radius: 10px;
  overflow: hidden;
}

.skill-fill {
  height: 100%;
  background: #58a6ff;
  width: 0;
}

/* CERT IMAGE */
.img-cert {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
  border: 1px solid #454950;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
<div class="container">

<a class="navbar-brand fw-bold">⚡ My CV</a>

<ul class="navbar-nav flex-wrap mx-auto">
<li class="nav-item"><a class="nav-link active" href="#" id="homeBtn">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="aboutBtn">About</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="skillsBtn">Skills</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="eduBtn">Education</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="expBtn">Experience</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="portBtn">Portfolio</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="certBtn">Certificates</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="contactBtn">Contact</a></li>
</ul>

</div>
</nav>

<div id="home-content"></div>
<div class="container py-4" id="main-content" style="display:none;">
  <div id="page-container"></div>
</div>

<script>

/* ACTIVE MENU */
function setActive(el){
$('.nav-link').removeClass('active');
$(el).addClass('active');
}

/* LOAD CONTENT FIX */
function loadCardContent(html){
$('#home-content').hide();
$('#main-content').fadeIn(150);
$('#page-container').html(html).hide().fadeIn(200);
}

/* HOME */
function loadHome(){
$('#main-content').hide();
$('#home-content').html(`
<div class="hero-wrapper">
  <div>
    <img src="agng.jpeg" class="profile">
    <h2>Agung Saiful Kamil</h2>
    <p>Mahasiswa • Web Developer</p>
  </div>
</div>
`);
}

/* ABOUT */
function loadAbout(){
loadCardContent('<div class="card p-4"><h5>About</h5><p>Saya mahasiswa web developer.</p></div>');
}

/* SKILLS */
function loadSkills(){
loadCardContent(`
<div class="card p-4">
<h5>Skills</h5>
<p>HTML</p><div class="skill-bar mb-2"><div class="skill-fill" data-width="90%"></div></div>
<p>CSS</p><div class="skill-bar mb-2"><div class="skill-fill" data-width="85%"></div></div>
<p>JavaScript</p><div class="skill-bar mb-2"><div class="skill-fill" data-width="75%"></div></div>
</div>`);

setTimeout(function(){
$('.skill-fill').each(function(){
  $(this).animate({width:$(this).data('width')},1000);
});
},200);
}

/* EDUCATION */
function loadEducation(){
loadCardContent('<div class="card p-4"><h5>Education</h5><p>Universitas Ma’soem</p></div>');
}

/* EXPERIENCE */
function loadExperience(){
loadCardContent('<div class="card p-4"><h5>Experience</h5><p>Project web & organisasi</p></div>');
}

/* PORTFOLIO */
function loadPortfolio(){
loadCardContent('<div class="card p-4"><h5>Portfolio</h5><p>Website CV & aplikasi</p></div>');
}

/* CERTIFICATES (FIX GAMBAR) */
function loadCertificates(){

let certs = "";

for(let i=1;i<=12;i++){
certs += `
<div class="col-md-4 col-6 mb-3 text-center">
  <img src="agung${i}.jpeg"
       class="img-cert mb-2"
       onerror="this.src='https://via.placeholder.com/300x200/1e1f22/ffffff?text=Certificate+${i}'">
  <small>Sertifikat ${i}</small>
</div>`;
}

loadCardContent(`
<div class="card p-4">
<h5 class="mb-3">Certificates</h5>
<div class="row">${certs}</div>
</div>
`);
}

/* CONTACT */
function loadContact(){
loadCardContent('<div class="card p-4"><h5>Contact</h5><p>Email: kamu@email.com</p></div>');
}

/* EVENTS */
$(document).ready(function(){

loadHome();

$('#homeBtn').click(e=>{e.preventDefault();setActive(e.target);loadHome();});
$('#aboutBtn').click(e=>{e.preventDefault();setActive(e.target);loadAbout();});
$('#skillsBtn').click(e=>{e.preventDefault();setActive(e.target);loadSkills();});
$('#eduBtn').click(e=>{e.preventDefault();setActive(e.target);loadEducation();});
$('#expBtn').click(e=>{e.preventDefault();setActive(e.target);loadExperience();});
$('#portBtn').click(e=>{e.preventDefault();setActive(e.target);loadPortfolio();});
$('#certBtn').click(e=>{e.preventDefault();setActive(e.target);loadCertificates();});
$('#contactBtn').click(e=>{e.preventDefault();setActive(e.target);loadContact();});

});

</script>

</body>
</html>
