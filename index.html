<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV Profesional - Agung</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
  background-color: #205bd2; 
  color: #ffffff; 
  font-family: 'Inter', sans-serif;
}

.navbar-custom {
  background: rgba(22, 202, 230, 0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid #454950;
}

.nav-link {
  color: #ffffff !important;
  opacity: 0.8;
  transition: 0.3s;
}

.nav-link:hover, .nav-link.active {
  color: #58a6ff !important;
  opacity: 1;
}

.nav-link.active {
  border-bottom: 2px solid #58a6ff;
}

.card {
  background: #174dd5;
  border: 1px solid #454950;
  border-radius: 18px;
  color: #ffffff;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-6px);
  border-color: #58a6ff;
}

.profile {
  width:160px;
  height:160px;
  border-radius: 50%;
  border: 4px solid #58a6ff;
  object-fit: cover;
  margin-bottom: 2rem;
}

.btn-primary {
  background: linear-gradient(45deg,#238636,#2ea043);
  border: none;
  padding: 10px 25px;
}

.hero-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: calc(100vh - 72px);
  text-align: center;
}

.hero h2 { font-size: 3rem; font-weight: 600; }

.img-cert {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
  border: 1px solid #454950;
  transition: 0.3s;
}

.img-cert:hover {
  border-color: #58a6ff;
  transform: scale(1.05);
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
<div class="container">
<a class="navbar-brand fw-bold">⚡ My CV</a>
<ul class="navbar-nav flex-wrap mx-auto">
<li class="nav-item"><a class="nav-link active" href="#" id="homeBtn">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="aboutBtn">About</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="skillsBtn">Skills</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="eduBtn">Education</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="expBtn">Experience</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="portBtn">Portfolio</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="certBtn">Certificates</a></li>
<li class="nav-item"><a class="nav-link" href="#" id="contactBtn">Contact</a></li>
</ul>
</div>
</nav>

<div id="home-content"></div>
<div class="container py-4" id="main-content" style="display: none;">
  <div id="page-container"></div>
</div>

<script>
function setActive(el){
$('.nav-link').removeClass('active');
$(el).addClass('active');
}

function loadCardContent(html){
$('#home-content').hide();
$('#main-content').fadeIn(150);
$('#page-container').fadeOut(150,function(){
$(this).html(html).fadeIn(250);
$('.skill-fill').each(function(){
$(this).animate({width:$(this).data('width')},1000);
});
});
}

function loadHome(){
$('#main-content').hide();
$('#home-content').html(`
<div class="hero-wrapper">
  <div class="hero">
    <img src="agng.jpeg" class="profile" alt="Profil">
    <h2>Agung Saiful Kamil</h2>
    <p class="subtitle">Mahasiswa • Web Developer</p>
    <div class="mt-4">
      <button class="btn btn-primary me-2">Hire Me</button>
      <button class="btn btn-outline-light">Download CV</button>
    </div>
  </div>
</div>
`).fadeIn(250);
}

/* ABOUT */
function loadAbout(){
loadCardContent('<div class="card p-4"><h5>👨‍💻 Tentang Saya</h5><p>Saya adalah seorang mahasiswa yang memiliki ketertarikan besar dalam bidang pengembangan web serta desain UI/UX. Ketertarikan ini mendorong saya untuk terus mempelajari berbagai teknologi terbaru, mulai dari dasar-dasar pemrograman hingga pengembangan antarmuka yang menarik dan ramah pengguna. Saya percaya bahwa kombinasi antara kemampuan teknis dan desain yang baik sangat penting untuk menciptakan sebuah produk digital yang berkualitas..</p></div>');
}

/* SKILLS */
function loadSkills(){
loadCardContent(`
<div class="card p-4">
<h5>🚀 Skills</h5>
<p class="mb-1">HTML</p><div class="skill-bar mb-3"><div class="skill-fill" data-width="90%"></div></div>
<p class="mb-1">CSS</p><div class="skill-bar mb-3"><div class="skill-fill" data-width="85%"></div></div>
<p class="mb-1">JavaScript</p><div class="skill-bar mb-3"><div class="skill-fill" data-width="75%"></div></div>
</div>`);
}

/* EDUCATION */
function loadEducation(){
loadCardContent('<div class="card p-4"><h5>🎓 Education</h5><ul><li>D3 Komputerisasi Akuntansi - Universitas Ma\'soem</li><li>SMAN 2 CIMALAKA</li></ul></div>');
}

/* EXPERIENCE */
function loadExperience(){
loadCardContent('<div class="card p-4"><h5>💼 Experience</h5><p>Aktif organisasi kampus & membuat berbagai project web</p></div>');
}

/* PORTFOLIO */
function loadPortfolio(){
loadCardContent(`
<div class="card p-4">
<h5>🖼️ Portfolio</h5>
<div class="row">
<div class="col-6 mb-3"><div class="card p-3 text-center border-secondary">Website CV</div></div>
<div class="col-6 mb-3"><div class="card p-3 text-center border-secondary">Aplikasi Kasir</div></div>
</div>
</div>`);
}

/* CERTIFICATES - VERSI RAPI */
function loadCertificates(){
let certs = "";
for(let i=1; i<=12; i++){
  certs += `
  <div class="col-md-4 col-6 mb-4 text-center">
    <img src="agung${i}.jpeg" class="img-cert mb-2" alt="Cert ${i}" onerror="this.src='https://via.placeholder.com/300x200/1e1f22/ffffff?text=Certificate+${i}'">
    <small class="d-block fw-bold">Sertifikat Keahlian ${i}</small>
  </div>`;
}

loadCardContent(`
<div class="card p-4">
  <h5 class="mb-4">📜 Certificates & Awards</h5>
  <div class="row">${certs}</div>
</div>`);
}

/* CONTACT */
function loadContact(){
loadCardContent(`
<div class="card p-4">
<h5>📬 Contact Me</h5>
<input id="nama" class="form-control mb-2" placeholder="Nama">
<input id="email" class="form-control mb-2" placeholder="Email">
<textarea id="pesan" class="form-control mb-2" placeholder="Pesan"></textarea>
<button class="btn btn-primary w-100 mt-3" id="kirim">Kirim</button>
</div>`);

$(document).off("click","#kirim").on("click","#kirim",function(){
  alert("Pesan berhasil dikirim 🚀");
});
}

$(document).ready(function(){
loadHome();
$('#homeBtn').click(e=>{e.preventDefault();setActive(e.target);loadHome();});
$('#aboutBtn').click(e=>{e.preventDefault();setActive(e.target);loadAbout();});
$('#skillsBtn').click(e=>{e.preventDefault();setActive(e.target);loadSkills();});
$('#eduBtn').click(e=>{e.preventDefault();setActive(e.target);loadEducation();});
$('#expBtn').click(e=>{e.preventDefault();setActive(e.target);loadExperience();});
$('#portBtn').click(e=>{e.preventDefault();setActive(e.target);loadPortfolio();});
$('#certBtn').click(e=>{e.preventDefault();setActive(e.target);loadCertificates();});
$('#contactBtn').click(e=>{e.preventDefault();setActive(e.target);loadContact();});
});
</script>

</body>
</html>
